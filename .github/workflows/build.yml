name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ytdlp_asset: yt-dlp_linux
            ytdlp_bin: yt-dlp-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ytdlp_asset: yt-dlp.exe
            ytdlp_bin: yt-dlp-x86_64-pc-windows-msvc.exe
          - platform: windows-latest
            target: i686-pc-windows-msvc
            ytdlp_asset: yt-dlp_x86.exe
            ytdlp_bin: yt-dlp-i686-pc-windows-msvc.exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            ytdlp_asset: yt-dlp_macos
            ytdlp_bin: yt-dlp-aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
            ytdlp_asset: yt-dlp_macos
            ytdlp_bin: yt-dlp-x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Download yt-dlp sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o "src-tauri/binaries/${{ matrix.ytdlp_bin }}" \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/${{ matrix.ytdlp_asset }}"
          chmod +x "src-tauri/binaries/${{ matrix.ytdlp_bin }}" || true
          echo "yt-dlp sidecar downloaded:"
          ls -lh src-tauri/binaries/

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'YT Downloader ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}

  generate-updater-json:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "Generating updater JSON for version $VERSION..."

          # Get release assets
          RELEASE_JSON=$(curl -sL \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ github.ref_name }}")

          # Build latest.json manually for all platforms
          cat > latest.json << 'LATEST_EOF'
          {
            "version": "VERSION_PLACEHOLDER",
            "notes": "YT Downloader VERSION_PLACEHOLDER - Mise à jour automatique",
            "pub_date": "PUB_DATE_PLACEHOLDER",
            "platforms": {}
          }
          LATEST_EOF

          # Get pub_date from release
          PUB_DATE=$(echo "$RELEASE_JSON" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('published_at','')[:19].replace(' ','T')+'Z')")
          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" latest.json
          sed -i "s/PUB_DATE_PLACEHOLDER/$PUB_DATE/g" latest.json

          # Extract platform info from assets
          python3 << PYEOF
          import json, re

          with open('latest.json') as f:
              data = json.load(f)

          release = json.loads('''$RELEASE_JSON''')
          assets = release.get('assets', [])

          platform_map = {
              'x86_64-pc-windows-msvc': {'sig': '.sig', 'ext': '.exe'},
              'aarch64-apple-darwin': {'sig': '.sig', 'ext': '.AppImage.tar.gz'},
              'x86_64-apple-darwin': {'sig': '.sig', 'ext': '.AppImage.tar.gz'},
              'x86_64-unknown-linux-gnu': {'sig': '.sig', 'ext': '.AppImage.tar.gz'},
          }

          for asset in assets:
              name = asset['name']
              url = asset['browser_download_url']
              for target, info in platform_map.items():
                  if target.replace('-', '_') in name.replace('-', '_') or target in name:
                      sig_name = name + '.sig'
                      sig_url = url + '.sig'
                      if any(a['name'] == sig_name for a in assets):
                          data['platforms'][target] = {
                              'signature': sig_url,
                              'url': url
                          }
                          break

          with open('latest.json', 'w') as f:
              json.dump(data, f, indent=2)
          PYEOF

          cat latest.json

      - name: Upload latest.json to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          curl -sL \
            -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @latest.json \
            "https://uploads.github.com/repos/${{ github.repository }}/releases/$(curl -s https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')/assets?name=latest.json"
