name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            ytdlp_asset: yt-dlp_linux
            ytdlp_bin: yt-dlp-x86_64-unknown-linux-gnu
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            ytdlp_asset: yt-dlp.exe
            ytdlp_bin: yt-dlp-x86_64-pc-windows-msvc.exe
          - platform: windows-latest
            target: i686-pc-windows-msvc
            ytdlp_asset: yt-dlp_x86.exe
            ytdlp_bin: yt-dlp-i686-pc-windows-msvc.exe
          - platform: macos-latest
            target: aarch64-apple-darwin
            ytdlp_asset: yt-dlp_macos
            ytdlp_bin: yt-dlp-aarch64-apple-darwin
          - platform: macos-13
            target: x86_64-apple-darwin
            ytdlp_asset: yt-dlp_macos
            ytdlp_bin: yt-dlp-x86_64-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Download yt-dlp sidecar
        shell: bash
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o "src-tauri/binaries/${{ matrix.ytdlp_bin }}" \
            "https://github.com/yt-dlp/yt-dlp/releases/latest/download/${{ matrix.ytdlp_asset }}"
          chmod +x "src-tauri/binaries/${{ matrix.ytdlp_bin }}" || true
          echo "yt-dlp sidecar downloaded:"
          ls -lh src-tauri/binaries/

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'YouTube Downloader ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
